name: Monday + Smartling Agent

on:
  workflow_dispatch:  # manual trigger only — enable schedule below once verified

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          echo "SMARTLING_USER_ID=${{ secrets.SMARTLING_USER_ID }}" >> .env
          echo "SMARTLING_USER_SECRET=${{ secrets.SMARTLING_USER_SECRET }}" >> .env
          echo "MONDAY_API_TOKEN=${{ secrets.MONDAY_API_TOKEN }}" >> .env

      - name: Run agent
        run: python monday_smartling_agent.py
