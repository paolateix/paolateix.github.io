name: Monday + Smartling Agent

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 12 PM Israel time (UTC+3), weekdays only
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes made)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          echo "SMARTLING_USER_ID=${{ secrets.SMARTLING_USER_ID }}" >> .env
          echo "SMARTLING_USER_SECRET=${{ secrets.SMARTLING_USER_SECRET }}" >> .env
          echo "MONDAY_API_TOKEN=${{ secrets.MONDAY_API_TOKEN }}" >> .env
          echo "SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}" >> .env

      - name: Run agent
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python monday_smartling_agent.py --dry-run
          else
            python monday_smartling_agent.py
          fi
