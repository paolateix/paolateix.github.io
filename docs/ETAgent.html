<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETAgent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0b1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16112e;
      border: 1px solid #2e1f5e;
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .run-btn {
      width: 100%;
      padding: 16px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .run-btn:hover:not(:disabled) { background: #6d28d9; }
    .run-btn:active:not(:disabled) { transform: scale(0.98); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .dry-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #a78bfa;
      border: 1.5px solid #4c1d95;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .dry-btn:hover:not(:disabled) { background: #1e1040; border-color: #7c3aed; }
    .dry-btn:active:not(:disabled) { transform: scale(0.98); }
    .dry-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 24px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      text-align: left;
      line-height: 1.6;
    }

    .status.loading { background: #1e1040; border: 1px solid #7c3aed; color: #c4b5fd; display: block; }
    .status.success { background: #1a2e22; border: 1px solid #2d6a4f; color: #6ee7b7; display: block; }
    .status.error   { background: #2e1a1a; border: 1px solid #6a2d2d; color: #fc8181; display: block; }

    .log-box {
      margin-top: 14px;
      background: #0a0812;
      border: 1px solid #2e1f5e;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      color: #d4c5ff;
      text-align: left;
      white-space: pre-wrap;
      max-height: 320px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .status a { color: inherit; font-weight: 600; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌍</div>
    <h1>ETAgent</h1>
    <p class="subtitle">
      Scans overdue tasks on the Monday board, publishes ready languages in Smartling,
      comments on each task, and marks them Done.
    </p>

    <div class="btn-group">
      <button class="run-btn" id="runBtn" onclick="runAgent(false)">
        Run Agent
      </button>
      <button class="dry-btn" id="dryBtn" onclick="runAgent(true)">
        🔍 Dry Run — preview only, no changes
      </button>
    </div>

    <div class="status" id="status"></div>

  </div>

  <script>
    const REPO   = 'paolateix/monday-smartling-agent';
    const BRANCH = 'main';
    const WORKFLOW_FILE = 'monday_smartling.yml';
    const GH_TOKEN = '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';

    function loadToken() {
      return GH_TOKEN;
    }

    function setStatus(type, html) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }

    const ghHeaders = (token) => ({
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github+json',
    });

    async function ghGet(token, path) {
      const r = await fetch(`https://api.github.com${path}`, { headers: ghHeaders(token) });
      if (!r.ok) throw new Error(`GitHub API ${r.status}: ${path}`);
      return r.json();
    }

    async function pollUntilComplete(token, runId) {
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const data = await ghGet(token, `/repos/${REPO}/actions/runs/${runId}`);
        if (data.status === 'completed') return data;
        setStatus('loading', `<span class="spinner"></span> Running… (${Math.round((i + 1) * 5)}s)`);
      }
      throw new Error('Timed out waiting for run to complete (5 min).');
    }

    async function fetchLog(token, runId) {
      const jobs = await ghGet(token, `/repos/${REPO}/actions/runs/${runId}/jobs`);
      const job = jobs.jobs?.[0];
      if (!job) return null;

      // GitHub returns a redirect to a pre-signed log URL
      const logRes = await fetch(
        `https://api.github.com/repos/${REPO}/actions/jobs/${job.id}/logs`,
        { headers: ghHeaders(token), redirect: 'follow' }
      );
      if (!logRes.ok) return null;
      const raw = await logRes.text();

      // Strip timestamp prefixes (2026-06-21T09:00:00.000Z  ) and GitHub step banners
      return raw
        .split('\n')
        .map(l => l.replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z\s+/, ''))
        .filter(l => !l.startsWith('##[') && l.trim() !== '')
        .join('\n');
    }

    async function runAgent(isDryRun = false) {
      const token = loadToken();
      if (!token) {
        setStatus('error', '⚠️ No GitHub token saved. Open ⚙️ setup below and add your token first.');
        return;
      }

      const runBtn = document.getElementById('runBtn');
      const dryBtn = document.getElementById('dryBtn');
      runBtn.disabled = true;
      dryBtn.disabled = true;
      const label = isDryRun ? 'Dry run' : 'Agent';
      setStatus('loading', `<span class="spinner"></span> Triggering ${label.toLowerCase()}…`);

      try {
        // 1. Trigger workflow
        const triggerRes = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
          {
            method: 'POST',
            headers: { ...ghHeaders(token), 'Content-Type': 'application/json' },
            body: JSON.stringify({ ref: BRANCH, inputs: { dry_run: isDryRun ? 'true' : 'false' } }),
          }
        );
        if (!triggerRes.ok) {
          const err = await triggerRes.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${triggerRes.status}`);
        }

        // 2. Wait briefly then get the run ID
        setStatus('loading', `<span class="spinner"></span> ${label} queued — waiting for run to start…`);
        await new Promise(r => setTimeout(r, 4000));

        const runsData = await ghGet(token, `/repos/${REPO}/actions/runs?per_page=1&branch=${BRANCH}`);
        const run = runsData.workflow_runs?.[0];
        if (!run) throw new Error('Could not find the triggered run.');

        setStatus('loading', `<span class="spinner"></span> Running… <a href="${run.html_url}" target="_blank" style="color:inherit">(open in GitHub)</a>`);

        // 3. Poll until done
        const completed = await pollUntilComplete(token, run.id);
        const succeeded = completed.conclusion === 'success';

        // 4. Fetch and show log (dry run only — for real runs just show result)
        // Fetch log for both modes — needed to detect "nothing to do"
        setStatus('loading', `<span class="spinner"></span> Fetching results…`);
        const log = await fetchLog(token, run.id).catch(() => null);
        const noTasks = log && log.includes('Nothing to do');

        if (!succeeded) {
          const logHtml = log
            ? `<div class="log-box">${log.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`
            : `<a href="${completed.html_url}" target="_blank">→ View error log</a>`;
          setStatus('error', `❌ ${isDryRun ? 'Dry run' : 'Run'} failed — see log below:<br>${logHtml}`);
        } else if (noTasks) {
          setStatus('success', `✅ No actions to take — no overdue tasks found.`);
        } else if (isDryRun) {
          const logHtml = log
            ? `<div class="log-box">${log.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`
            : `<a href="${completed.html_url}" target="_blank">→ View full log on GitHub</a>`;
          setStatus('success', `🔍 Here's what Run Agent would do:${logHtml}`);
        } else {
          setStatus('success', `✅ Complete`);
        }

      } catch (e) {
        setStatus('error', `❌ Error: ${e.message}`);
      } finally {
        runBtn.disabled = false;
        dryBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
