<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETAgent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0b1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16112e;
      border: 1px solid #2e1f5e;
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .run-btn {
      width: 100%;
      padding: 16px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .run-btn:hover:not(:disabled) { background: #6d28d9; }
    .run-btn:active:not(:disabled) { transform: scale(0.98); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .dry-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #a78bfa;
      border: 1.5px solid #4c1d95;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .dry-btn:hover:not(:disabled) { background: #1e1040; border-color: #7c3aed; }
    .dry-btn:active:not(:disabled) { transform: scale(0.98); }
    .dry-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 24px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      text-align: left;
      line-height: 1.6;
    }

    .status.loading { background: #1e1040; border: 1px solid #7c3aed; color: #c4b5fd; display: block; }
    .status.success { background: #1a2e22; border: 1px solid #2d6a4f; color: #6ee7b7; display: block; }
    .status.error   { background: #2e1a1a; border: 1px solid #6a2d2d; color: #fc8181; display: block; }

    .log-box {
      margin-top: 14px;
      background: #0a0812;
      border: 1px solid #2e1f5e;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      color: #d4c5ff;
      text-align: left;
      white-space: pre-wrap;
      max-height: 320px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .server-note {
      margin-top: 28px;
      font-size: 12px;
      color: #4a3f6b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌍</div>
    <h1>ETAgent</h1>
    <p class="subtitle">
      Scans overdue tasks on the Monday board, publishes ready languages in Smartling,
      comments on each task, and marks them Done.
    </p>

    <div class="btn-group">
      <button class="run-btn" id="runBtn" onclick="runAgent(false)">
        Run Agent
      </button>
      <button class="dry-btn" id="dryBtn" onclick="runAgent(true)">
        🔍 Dry Run — preview only, no changes
      </button>
    </div>

    <div class="status" id="status"></div>

    <p class="server-note">Requires <code>server.py</code> running locally</p>
  </div>

  <script>
    const SERVER = 'http://localhost:7432';

    function setStatus(type, html) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }

    async function runAgent(isDryRun = false) {
      const runBtn = document.getElementById('runBtn');
      const dryBtn = document.getElementById('dryBtn');
      runBtn.disabled = true;
      dryBtn.disabled = true;
      const label = isDryRun ? 'Dry run' : 'Agent';
      setStatus('loading', `<span class="spinner"></span> Running ${label.toLowerCase()}…`);

      try {
        const res = await fetch(`${SERVER}/run?dry_run=${isDryRun}`, { method: 'POST' });
        if (!res.ok) throw new Error(`Server error: HTTP ${res.status}`);
        const data = await res.json();

        const output = (data.output || '').trim();
        const noTasks = output.includes('Nothing to do');

        if (!data.success) {
          const logHtml = output
            ? `<div class="log-box">${output.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`
            : '';
          setStatus('error', `❌ ${label} failed:${logHtml}`);
        } else if (noTasks) {
          setStatus('success', `✅ No actions to take — no overdue tasks found.`);
        } else if (isDryRun) {
          const logHtml = output
            ? `<div class="log-box">${output.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`
            : '';
          setStatus('success', `🔍 Here's what Run Agent would do:${logHtml}`);
        } else {
          setStatus('success', `✅ Complete`);
        }

      } catch (e) {
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          setStatus('error', `❌ Cannot reach the local server.<br><br>Make sure <code>server.py</code> is running:<br><code style="font-size:12px">python server.py</code>`);
        } else {
          setStatus('error', `❌ Error: ${e.message}`);
        }
      } finally {
        runBtn.disabled = false;
        dryBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
